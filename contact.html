<!DOCTYPE html>
<html>
<head>
    <title>Floating Label Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .form-box{
            background:#fff;
            padding:30px;
            width:350px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .input-group{
            position:relative;
            margin-bottom:25px;
        }

        .input-group input,
        .input-group textarea{
            width:100%;
            padding:12px 10px;
            border:1px solid #999;
            outline:none;
            border-radius:5px;
            font-size:16px;
            background:none;
        }

        .input-group label{
            position:absolute;
            left:12px;
            top:12px;
            background:#fff;
            padding:0 5px;
            color:#777;
            transition:0.3s;
            pointer-events:none;
        }

        .input-group input:focus + label,
        .input-group input:valid + label,
        .input-group textarea:focus + label,
        .input-group textarea:valid + label{
            top:-10px;
            left:10px;
            font-size:12px;
            color:#007bff;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#007bff;
            color:#fff;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

    <div class="form-box">

        <form>

            <div class="input-group">
                <input type="text" required>
                <label>Name</label>
            </div>

            <div class="input-group">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="password" required>
                <label>Password</label>
            </div>

            <div class="input-group">
                <textarea rows="4" required></textarea>
                <label>Message</label>
            </div>

            <button type="submit">Submit</button>

        </form>

    </div>

</body>
</html>
